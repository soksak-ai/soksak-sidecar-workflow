name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  context:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - id: identity
        run: node scripts/release-context.mjs
      - run: node scripts/gate.mjs

  matrix:
    needs: context
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
      - id: targets
        run: node scripts/release-matrix.mjs

  build:
    needs: [context, matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - run: cargo test --locked --target "${{ matrix.target }}"
      - run: cargo build --locked --release --target "${{ matrix.target }}" --bin soksak-sidecar-workflow
      - run: node scripts/stage-release.mjs --target "${{ matrix.target }}" --binary "target/${{ matrix.target }}/release/soksak-sidecar-workflow${{ contains(matrix.target, 'windows') && '.exe' || '' }}" --out dist/stage
      - run: node scripts/build-artifact.mjs --target "${{ matrix.target }}" --tag "${{ needs.context.outputs.tag }}" --input dist/stage --out dist/artifact
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sidecar-${{ matrix.target }}
          path: |
            dist/artifact/*.tar.gz
            dist/artifact/artifact-${{ matrix.target }}.json
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: [context, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: "10.30.3"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: sidecar-*
          path: dist/artifacts
          merge-multiple: true
      - run: node scripts/build-release.mjs --commit "${{ github.sha }}" --tag "${{ needs.context.outputs.tag }}" --artifacts dist/artifacts --out dist/release
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: soksak-ai/soksak-spec
          ref: d7f54852754195527f125d1fc11362316157d19b
          path: .dependency/soksak-spec
      - name: Build the exact public validator without links
        working-directory: .dependency/soksak-spec
        run: |
          pnpm --config.node-linker=hoisted --config.symlink=false install --frozen-lockfile
          pnpm build
          test -z "$(find . -type l -print -quit)"
      - run: node scripts/validate-with-spec.mjs --spec-root .dependency/soksak-spec --release-dir dist/release
      - run: node scripts/assemble-publish.mjs --artifacts dist/artifacts --release dist/release --out dist/publish
      - name: Create least-privilege release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.SOKSAK_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.SOKSAK_RELEASE_PRIVATE_KEY }}
          permission-administration: read
          permission-contents: write
      - run: node scripts/publish-release.mjs --repository "${{ github.repository }}" --commit "${{ github.sha }}" --assets dist/publish
        env:
          SOKSAK_RELEASE_TOKEN: ${{ steps.release-token.outputs.token }}
